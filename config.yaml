baseurl: https://lex.sh
languageCode: zh-cn
theme: stack
paginate: 6
title: Lex.sh

# Change it to your Disqus shortname before using
disqusShortname: lexsh

# GA Tracking ID
googleAnalytics: UA-30327263-4

# Theme i18n support
# Available values: en, fr, id, ja, ko, pt-br, zh-cn, es, de, nl
DefaultContentLanguage: zh-cn

permalinks:
    post: /p/:filename/
    page: /:slug/ # :slug

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon:

    footer:
        since: 2006
        customText:

    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        # emoji: 🍥
        subtitle: "我是 Lex，常用网络 id: lexrus，中年 Swift 程序员一枚。
  此站点无责任不定期更新（间隔单位可以是年），欢迎订阅。"
        avatar:
            local: false
            src: /images/avatar.png

    article:
        math: false
        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: disqus

        utterances:
            repo:
            issueTerm: pathname
            label:

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:

    widgets:
        enabled:
            # - search
            - archives
            - tag-cloud

        archives:
            limit: 5

        tagCloud:
            limit: 10

    opengraph:
        twitter:
            # Your Twitter username
            site: lexrus

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
        cover:
            enabled: false
        content:
            enabled: false

### Custom menu
### See https://docs.stack.jimmycai.com/configuration/custom-menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main:
        - identifier: home
          name: 首页
          url: /
          weight: -100
          pre: home
        - identifier: about
          name: 关于我
          url: /about
          weight: -80
          pre: user
        - identifier: swiftymenu
          name: SwiftyMenu
          url: /SwiftyMenu
          weight: -70
          pre: terminal
        # - identifier: RegExPlus
        #   name: RegEx+
        #   url: /RegExPlus
        #   weight: -60
        #   pre: aorb

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    highlight:
        noClasses: false